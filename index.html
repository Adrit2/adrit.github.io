<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Adrit | Computer in Businesses</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --surface: #1e1e2e;
  --border: rgba(255,255,255,0.08);
  --text: #e8f6ff;
  --text-muted: #8aaec2;

  /* SKY BLUE THEME */
  --accent: #38bdf8;       /* main sky blue */
  --accent2: #7dd3fc;      /* light sky blue */
  --accent3: #0ea5e9;      /* deeper sky blue */
  --glow: rgba(56,189,248,0.35);

  --radius: 16px;
  --transition: 0.3s ease;
}

/* light theme */
[data-theme="light"] {
  --bg: #f0f9ff;
  --bg2: #e0f2fe;
  --bg3: #bae6fd;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.08);
  --text: #0c4a6e;
  --text-muted: #0369a1;
  --glow: rgba(56,189,248,0.2);
}

/* reset */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}

/* navbar */
nav{
  position:fixed;top:0;width:100%;
  padding:1rem 2rem;
  display:flex;justify-content:space-between;
  backdrop-filter:blur(10px);
}
.nav-logo{font-family:'Syne';font-weight:800}
.nav-logo span{color:var(--accent)}

/* hero */
#hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero-title{
  font-size:clamp(3rem,7vw,5rem);
}
.accent{color:var(--accent)}

/* buttons */
.btn{
  padding:0.8rem 1.8rem;
  border-radius:50px;
  border:none;
  cursor:pointer;
  margin:0.5rem;
}
.btn-primary{
  background:var(--accent);
  color:#fff;
  box-shadow:0 0 30px var(--glow);
}
.btn-outline{
  border:1px solid var(--accent);
  color:var(--accent);
  background:transparent;
}

/* cards */
.project-card{
  background:var(--surface);
  padding:1.5rem;
  border-radius:var(--radius);
  border:1px solid var(--border);
  transition:0.3s;
}
.project-card:hover{
  transform:translateY(-5px);
  border-color:var(--accent);
}

/* simple layout */
.container{
  max-width:1000px;
  margin:auto;
  padding:2rem;
}

section{padding:5rem 0}

/* footer */
footer{
  text-align:center;
  padding:2rem;
  border-top:1px solid var(--border);
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">A<span>.</span></div>
</nav>

<section id="hero">
  <div>
    <h1 class="hero-title">
      Hi, I'm <span class="accent">Adrit</span>
    </h1>
    <p>Computer in Businesses</p>
    <br>
    <button class="btn btn-primary">View Work</button>
    <button class="btn btn-outline">Contact</button>
  </div>
</section>

<section>
  <div class="container">
    <h2 class="accent">Projects</h2>
    <br>
    <div class="project-card">
      <h3>Inventory Intelligence</h3>
      <p>Smart system using predictive analytics.</p>
    </div>
  </div>
</section>

<footer>
  © 2025 Adrit — Sky Blue Theme
</footer>

</body>
</html>
